    <style>
        :root {
            --azul-boa: #003366;
            --celeste-boa: #00aaff;
            --plomo-claro: #f1f3f5;
            --plomo-texto: #6c757d;
        }

        body { background-color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        
        /* Animaciones */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse-soft {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .anim-fade-in { animation: fadeInUp 0.6s ease-out; }
        .hover-grow { transition: transform 0.3s ease; }
        .hover-grow:hover { transform: scale(1.03); }

        /* Estilos del Catálogo */
        .header-boa {
            background: linear-gradient(135deg, var(--azul-boa), var(--celeste-boa));
            color: white;
            padding: 60px 20px;
            border-bottom: 8px solid var(--plomo-claro);
        }

        .card-snippet {
            border: 2px solid var(--plomo-claro);
            border-radius: 20px;
            margin-bottom: 50px;
            overflow: hidden;
            background: white;
        }

        .preview-label {
            background: var(--plomo-claro);
            color: var(--azul-boa);
            font-weight: bold;
            padding: 10px 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .preview-area { padding: 40px; border-bottom: 1px solid var(--plomo-claro); }

        /* SECCIÓN DE CÓDIGO (LUMINOSA) */
        .code-area {
            background: #ffffff;
            padding: 20px;
            position: relative;
            border-top: 1px solid var(--plomo-claro);
        }

        code {
            color: #d63384; /* Color de código clásico pero en fondo claro */
            font-size: 0.9rem;
            display: block;
            white-space: pre-wrap;
        }

        .btn-copy {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--azul-boa);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 5px 15px;
            font-size: 0.75rem;
            z-index: 10;
        }
    </style>
</head>

    function escape(html) {
        return html.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function copy(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
