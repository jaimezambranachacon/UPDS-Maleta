<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jimmy's UI Kit | Moodle</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root { --primary: #003366; --accent: #00aaff; --bg: #f4f7f9; --light-grey: #e9ecef; }
        body { background-color: var(--bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .header { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; padding: 40px 20px; border-bottom: 5px solid #cbd5e0; }
        .card-snippet { border: none; border-radius: 15px; overflow: hidden; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .preview-section { background: white; padding: 30px; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid var(--light-grey); }
        .code-section { background: #2d3436; padding: 20px; position: relative; }
        code { color: #81ecec; font-size: 0.85rem; }
        .btn-copy { position: absolute; top: 10px; right: 10px; background: var(--accent); color: white; border: none; border-radius: 5px; padding: 5px 12px; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        .btn-copy:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="header text-center">
    <h1 class="font-weight-bold">Mis Snippets para Moodle</h1>
    <p class="lead">Librería de componentes elegantes, responsivos y listos para usar.</p>
</div>

<div class="container my-5">
    <div class="row" id="catalog">
        </div>
</div>

<script>
    // 1. AQUÍ AGREGAS TUS NUEVOS PEDAZOS DE CÓDIGO FÁCILMENTE
    const components = [
        {
            title: "Botón WhatsApp Azul/Celeste",
            html: `<a href="https://chat.whatsapp.com/HhxdY2mIZy46uYpeF9ATaP" target="_blank" class="btn shadow-lg p-3 d-flex align-items-center" style="background: linear-gradient(45deg, #003366, #00aaff); border-radius: 15px; color: white; border: none; min-width: 260px; text-decoration: none;">
    <i class="fab fa-whatsapp fa-2x mr-3"></i>
    <div class="text-left">
        <small class="d-block" style="opacity:0.8; text-transform: uppercase; font-size: 0.6rem; font-weight: bold; letter-spacing: 1px;">Canal de comunicación</small>
        <strong style="font-size: 1.2rem;">Grupo de la Clase</strong>
    </div>
</a>`
        },
        {
            title: "Banner de Tarea (Plomo y Azul)",
            html: `<div class="p-4 shadow-sm d-flex align-items-center" style="background: #ffffff; border-left: 10px solid #003366; border-radius: 10px; border-top: 1px solid #dee2e6; border-right: 1px solid #dee2e6; border-bottom: 1px solid #dee2e6;">
    <i class="fas fa-file-upload fa-3x mr-4" style="color: #cbd5e0;"></i>
    <div>
        <h4 style="color: #003366; margin: 0; font-weight: 800;">SUBIR PROYECTO FINAL</h4>
        <p style="color: #6c757d; margin: 0; font-size: 0.9rem;">Formatos aceptados: PDF, ZIP (Máx. 20MB)</p>
    </div>
</div>`
        }
    ];

    // 2. Función para renderizar el catálogo
    const catalog = document.getElementById('catalog');
    components.forEach((comp, index) => {
        const id = `code-${index}`;
        const card = `
            <div class="col-12">
                <div class="card-snippet">
                    <div class="bg-light p-2 border-bottom text-muted small font-weight-bold ml-3 mt-2">${comp.title}</div>
                    <div class="preview-section">${comp.html}</div>
                    <div class="code-section">
                        <button class="btn-copy" onclick="copyToClipboard('${id}')">COPIAR CÓDIGO</button>
                        <pre class="mb-0"><code id="${id}">${escapeHtml(comp.html)}</code></pre>
                    </div>
                </div>
            </div>`;
        catalog.innerHTML += card;
    });

    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function copyToClipboard(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
        alert("¡Copiado! Pégalo en el HTML de Moodle.");
    }
</script>

</body>
</html>
